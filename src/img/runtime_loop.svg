<svg xmlns="http://www.w3.org/2000/svg" width="900" height="640" font-family="Georgia, serif">
<rect width="900" height="640" fill="#ffffff"/>
<text x="450" y="34" font-size="22" text-anchor="middle" fill="#16335f">The living loop — one cognitive cycle</text>
<g font-size="15" text-anchor="middle">
<g><circle cx="450" cy="110" r="58" fill="#ecf3fc" stroke="#2c5aa0" stroke-width="2"/><text x="450" y="108" fill="#2c5aa0">PERCEIVE</text><text x="450" y="128" font-size="11" fill="#555">fold projections</text></g>
<g><circle cx="650" cy="190" r="58" fill="#ecf3fc" stroke="#2c5aa0" stroke-width="2"/><text x="650" y="188" fill="#2c5aa0">ORIENT</text><text x="650" y="208" font-size="11" fill="#555">world-model</text></g>
<g><circle cx="720" cy="370" r="58" fill="#fdeede" stroke="#8a4b10" stroke-width="2"/><text x="720" y="368" fill="#8a4b10">DELIBERATE</text><text x="720" y="388" font-size="11" fill="#555">reluctant action</text></g>
<g><circle cx="600" cy="520" r="58" fill="#fdeede" stroke="#8a4b10" stroke-width="2"/><text x="600" y="518" fill="#8a4b10">ACT</text><text x="600" y="538" font-size="11" fill="#555">leased effector</text></g>
<g><circle cx="380" cy="560" r="58" fill="#eef6f0" stroke="#1f7a44" stroke-width="2"/><text x="380" y="558" fill="#1f7a44">VERIFY</text><text x="380" y="578" font-size="11" fill="#555">non-valent gate</text></g>
<g><circle cx="200" cy="470" r="58" fill="#e7f7ec" stroke="#176b34" stroke-width="2"/><text x="200" y="468" fill="#176b34">REMEMBER</text><text x="200" y="488" font-size="11" fill="#555">consolidate</text></g>
<g><circle cx="160" cy="280" r="58" fill="#e7f7ec" stroke="#176b34" stroke-width="2"/><text x="160" y="278" fill="#176b34">EVOLVE</text><text x="160" y="298" font-size="11" fill="#555">diagnose→regen</text></g>
<g><circle cx="270" cy="140" r="58" fill="#f3eefb" stroke="#6b4fa0" stroke-width="2"/><text x="270" y="138" fill="#6b4fa0">REST</text><text x="270" y="158" font-size="11" fill="#555">low-load tend</text></g>
</g>
